<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>محاكاة تنس الطاولة</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Tajawal:wght@300;400;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0a0c0f;
      --panel:   rgba(14, 18, 24, 0.97);
      --border:  rgba(255,255,255,0.09);
      --accent:  #00e5ff;
      --accent2: #ff4d6d;
      --accent3: #7fff6e;
      --text:    #c8d4e0;
      --muted:   #5a6a7a;
      --radius:  8px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Tajawal', sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      display: flex;
      flex-direction: row;
    }

    /* ── Canvas ── */
    #canvas-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    #canvas-container canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    /* ══════════════════════════════════════
       SIDE PANEL
       ══════════════════════════════════════ */
    #panel {
      width: 200px;
      min-width: 200px;
      height: 100vh;
      overflow-y: auto;
      background: #0d1119;
      border-left: 1px solid var(--border);
      z-index: 100;
      padding: 10px 9px;
      display: flex;
      flex-direction: column;
      gap: 7px;
      box-shadow: -4px 0 30px rgba(0,0,0,0.6);
      zoom: 0.82;
    }

    #panel::-webkit-scrollbar { width: 2px; }
    #panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    #panel h1 {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--accent);
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
    }

    .ctrl-group { display: flex; flex-direction: column; gap: 4px; }

    .ctrl-label {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: 10px;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
    }

    .ctrl-label span { font-size: 11px; color: var(--accent); font-weight: 600; }

    input[type=range] {
      width: 100%; height: 3px;
      -webkit-appearance: none; appearance: none;
      background: var(--border); border-radius: 2px;
      outline: none; cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 12px; height: 12px; border-radius: 50%;
      background: var(--accent); box-shadow: 0 0 5px var(--accent);
      cursor: pointer; transition: transform .1s;
    }
    input[type=range]:hover::-webkit-slider-thumb { transform: scale(1.3); }

    .spin-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px; }

    .spin-btn {
      padding: 5px 3px;
      border: 1px solid var(--border);
      background: transparent; color: var(--muted);
      font-family: 'IBM Plex Mono', monospace; font-size: 8px;
      border-radius: 5px; cursor: pointer; transition: all .15s; text-align: center;
    }
    .spin-btn.active {
      border-color: var(--accent); color: var(--accent);
      background: rgba(0,229,255,.07);
    }
    .spin-btn:hover { border-color: rgba(255,255,255,.2); color: var(--text); }

    #launch-btn {
      width: 100%; padding: 8px;
      border: 1px solid var(--accent); background: rgba(0,229,255,.1);
      color: var(--accent); font-family: 'IBM Plex Mono', monospace;
      font-size: 10px; font-weight: 600; letter-spacing: .1em;
      text-transform: uppercase; border-radius: var(--radius);
      cursor: pointer; transition: all .2s;
    }
    #launch-btn:hover { background: rgba(0,229,255,.2); transform: translateY(-1px); }
    #launch-btn:active { transform: translateY(0); }

    .divider { border: none; border-top: 1px solid var(--border); margin: 2px 0; }

    .section-title {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 8px; font-weight: 600;
      letter-spacing: .12em; text-transform: uppercase;
      color: var(--accent2);
    }

    /* ── D-Pad ── */
    .dpad {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: 1fr 1fr 1fr;
      gap: 3px;
    }

    .dpad-bottom {
      display: grid; grid-template-columns: 1fr 1fr; gap: 3px;
    }

    .dir-btn {
      padding: 7px 3px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px; border-radius: 6px;
      cursor: pointer; transition: all .12s;
      line-height: 1.2; text-align: center;
      user-select: none; -webkit-user-select: none;
    }
    .dir-btn span { font-size: 6px; display: block; margin-top: 2px; opacity: 0.6; }
    .dir-btn:hover {
      border-color: var(--accent2); color: var(--accent2);
      background: rgba(255,77,109,.08);
    }
    .dir-btn:active { transform: scale(0.91); background: rgba(255,77,109,.18); }

    .stop-btn { border-color: rgba(255,200,0,0.25) !important; color: #ffc800 !important; }
    .stop-btn:hover { border-color: #ffc800 !important; background: rgba(255,200,0,.08) !important; }

    .keys-hint {
      font-size: 7px; font-family: 'IBM Plex Mono', monospace;
      color: var(--muted); text-align: center; line-height: 1.7;
      border: 1px solid var(--border); border-radius: 5px; padding: 5px;
    }

    /* ── Stats ── */
    #stats {
      position: absolute;
      bottom: 12px; left: 50%;
      transform: translateX(-50%);
      background: rgba(14,18,24,0.9);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      backdrop-filter: blur(16px);
      z-index: 50;
      padding: 10px 20px;
      display: flex; gap: 24px;
      box-shadow: 0 4px 20px rgba(0,0,0,.5);
    }

    .stat { display: flex; flex-direction: column; gap: 2px; align-items: center; }
    .stat-label { font-size: 8px; font-family: 'IBM Plex Mono', monospace; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; }
    .stat-val   { font-size: 13px; font-family: 'IBM Plex Mono', monospace; font-weight: 600; color: var(--accent3); }

    /* ── Hint ── */
    #hint {
      position: absolute; bottom: 12px; left: 12px;
      font-size: 10px; color: var(--muted);
      font-family: 'IBM Plex Mono', monospace; line-height: 1.7; z-index: 50;
    }
  </style>
</head>
<body>

  <!-- ══ Canvas ══ -->
  <div id="canvas-container">
    <div id="stats">
      <div class="stat"><div class="stat-label">السرعة |v|</div><div class="stat-val" id="s-speed">0.00</div></div>
      <div class="stat"><div class="stat-label">الارتفاع Y</div><div class="stat-val" id="s-height">0.00</div></div>
      <div class="stat"><div class="stat-label">الدوران |ω|</div><div class="stat-val" id="s-omega">0.00</div></div>
      <div class="stat"><div class="stat-label">ارتدادات</div><div class="stat-val" id="s-bounces">0</div></div>
    </div>
    <div id="hint">🖱 سحب للدوران · عجلة للتكبير</div>
  </div>

  <!-- ══ Side Panel ══ -->
  <div id="panel">
    <h1>⚡ تنس الطاولة</h1>

    <div class="ctrl-group">
      <div class="ctrl-label">السرعة v₀ <span id="v0-val">8</span> m/s</div>
      <input type="range" id="v0" min="2" max="20" step="0.5" value="8" />
    </div>

    <div class="ctrl-group">
      <div class="ctrl-label">زاوية θ <span id="theta-val">12</span>°</div>
      <input type="range" id="theta" min="-30" max="30" step="1" value="12" />
    </div>

    <div class="ctrl-group">
      <div class="ctrl-label">نوع الدوران</div>
      <div class="spin-row">
        <button class="spin-btn active" data-spin="topspin">TOP<br/>SPIN</button>
        <button class="spin-btn"        data-spin="none">NO<br/>SPIN</button>
        <button class="spin-btn"        data-spin="backspin">BACK<br/>SPIN</button>
      </div>
    </div>

    <div class="ctrl-group">
      <div class="ctrl-label">دوران ω <span id="omega-val">80</span> rad/s</div>
      <input type="range" id="omegaSlider" min="0" max="200" step="5" value="80" />
    </div>

    <button id="launch-btn">▶ إطلاق الكرة</button>

    <hr class="divider"/>

    <div class="section-title">🎮 تحكم يدوي</div>

    <div class="ctrl-group">
      <div class="ctrl-label">حجم الكرة <span id="ball-size-val">1.0</span>x</div>
      <input type="range" id="ball-size" min="0.5" max="4" step="0.1" value="1" />
    </div>

    <div class="ctrl-group">
      <div class="ctrl-label">قوة الدفع <span id="push-val">2</span> m/s</div>
      <input type="range" id="push-force" min="0.5" max="10" step="0.5" value="2" />
    </div>

    <!-- D-Pad -->
    <div class="dpad">
      <div></div>
      <button class="dir-btn" id="btn-forward">▲<br/><span>أمام</span></button>
      <div></div>

      <button class="dir-btn" id="btn-left">◄<br/><span>يسار</span></button>
      <button class="dir-btn" id="btn-up">↑<br/><span>أعلى</span></button>
      <button class="dir-btn" id="btn-right">►<br/><span>يمين</span></button>

      <div></div>
      <button class="dir-btn" id="btn-backward">▼<br/><span>خلف</span></button>
      <div></div>
    </div>

    <div class="dpad-bottom">
      <button class="dir-btn" id="btn-down">↓<br/><span>أسفل</span></button>
      <button class="dir-btn stop-btn" id="btn-stop">⏹<br/><span>إيقاف</span></button>
    </div>

    <div class="keys-hint">
      ⌨️ ↑↓←→ حركة · Space أعلى<br/>Shift أسفل · S إيقاف
    </div>

  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
